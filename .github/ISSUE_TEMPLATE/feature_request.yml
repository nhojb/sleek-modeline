name: Feature request
description: Suggest a new segment, option, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great! Please open this *before* sending a pull request so that we can agree on the path forward beforehand.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this has not been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to achieve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you have in mind. A new segment? A new customization variable? Sketch the behaviour.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to work on a pull request for this (after the design is agreed upon).
          required: false
